<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome — NEU Library</title>
  <link rel="stylesheet" href="/user/style.css">
</head>
<body>
  <div class="card">
    <div class="avatar-wrap">
      <img
        class="avatar" id="avatar" src="" alt="Profile"
        onerror="this.style.display='none'; document.getElementById('avatarFallback').style.display='flex'">
      <div class="avatar-fallback" id="avatarFallback">📚</div>
    </div>

    <div class="error-notice" id="errorNotice">
      ⚠️ Admin access only. You are currently in user mode.
    </div>

    <div class="welcome-text">Welcome to NEU Library!</div>
    <div class="user-email" id="userEmail">Loading...</div>
    <span class="role-badge" id="roleBadge">User</span>

    <div class="admin-only" id="adminSection">
      <button class="switch-btn" onclick="switchToAdmin()">
        🔐 Switch to Admin Dashboard
      </button>
    </div>

    <a href="/logout" class="logout-link">Sign out</a>
  </div>

  <script src="/user/app.js"></script>
</body>
</html>
