<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEU Library — Login</title>
  <link rel="stylesheet" href="/login/style.css">
</head>
<body>
  <div class="card">
    <div class="logo-wrap">📚</div>
    <h1>NEU Library System</h1>
    <p class="subtitle">Visitor Management Portal</p>
    <span class="neu-badge">New Era University</span>

    <div class="error-msg" id="errorMsg">
      ⚠️ Only @neu.edu.ph accounts are allowed. Please use your NEU institutional email.
    </div>

    <a href="/auth/google" class="google-btn">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
      Sign in with Google
    </a>

    <p class="note">Use your NEU institutional email (@neu.edu.ph) to continue.</p>
  </div>

  <script src="/login/app.js"></script>
</body>
</html>
